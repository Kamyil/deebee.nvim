name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-worker:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: deebee-worker
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            binary: deebee-worker
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            binary: deebee-worker
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: deebee-worker.exe
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build worker
        run: cargo build --release --package deebee-worker --target ${{ matrix.target }}

      - name: Package Unix archive
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          tar -czf "dist/deebee-worker-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" "${{ matrix.binary }}"

      - name: Package Windows archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -LiteralPath "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "dist/deebee-worker-${{ matrix.target }}.zip" -Force

      - name: Upload packaged worker
        uses: actions/upload-artifact@v4
        with:
          name: worker-${{ matrix.target }}
          path: dist/*

  publish-release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build-worker

    steps:
      - uses: actions/checkout@v4

      - name: Download worker artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: worker-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum deebee-worker-* > checksums.txt

      - name: Generate release manifest
        run: |
          python scripts/generate_release_manifest.py \
            --version "${GITHUB_REF_NAME#v}" \
            --protocol-version "1" \
            --dist-dir dist \
            --output dist/release-manifest.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/deebee-worker-*
            dist/checksums.txt
            dist/release-manifest.json
